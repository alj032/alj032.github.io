<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 400px;
            width: 100%;
            margin: 20px 0;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        #downloadSection {
            margin-top: 20px;
            display: none;
        }
        .download-btn {
            background-color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="getLocation">Get Current Location</button>
        <button id="followMe">Follow Me</button>
        <button id="stopTracking" disabled>Stop Tracking</button>
    </div>
    <div id="downloadSection">
        <button id="downloadGeoJSON" class="download-btn">Download Route (GeoJSON)</button>
        <button id="downloadGPX" class="download-btn">Download Route (GPX)</button>
    </div>
    <div id="status"></div>
    <div id="map"></div>

    <script>
        let map, marker, watchId, polyline;
        let locations = [];
        let timestamps = [];

        // Initialize map
        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Initialize polyline for tracking
            polyline = L.polyline([], {color: 'red'}).addTo(map);
        }

        function updateStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'error' : 'success';
        }

        function handleLocation(position) {
            const { latitude, longitude } = position.coords;
            const latlng = [latitude, longitude];
            
            // Add location and timestamp to arrays
            locations.push(latlng);
            timestamps.push(position.timestamp);
            
            // Update polyline
            polyline.setLatLngs(locations);

            // Create or update marker
            if (!marker) {
                marker = L.marker(latlng).addTo(map);
            } else {
                marker.setLatLng(latlng);
            }

            // Center map on new location
            map.setView(latlng, 15);
            
            updateStatus(`Location updated: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`);
        }

        function handleError(error) {
            const errors = {
                1: 'Permission denied',
                2: 'Position unavailable',
                3: 'Timeout'
            };
            updateStatus(`Error: ${errors[error.code] || error.message}`, true);
        }

        function createGeoJSON() {
            return {
                type: "FeatureCollection",
                features: [
                    {
                        type: "Feature",
                        properties: {
                            name: "Tracked Route",
                            timestamps: timestamps
                        },
                        geometry: {
                            type: "LineString",
                            coordinates: locations.map(latlng => [latlng[1], latlng[0]]) // Convert to [lon, lat] for GeoJSON
                        }
                    }
                ]
            };
        }

        function createGPX() {
            const points = locations.map((latlng, i) => 
                `    <trkpt lat="${latlng[0]}" lon="${latlng[1]}">
      <time>${new Date(timestamps[i]).toISOString()}</time>
    </trkpt>`
            ).join('\n');

            return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Location Tracker Web App"
  xmlns="http://www.topografix.com/GPX/1/1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd">
  <trk>
    <name>Tracked Route</name>
    <trkseg>
${points}
    </trkseg>
  </trk>
</gpx>`;
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Initialize map on load
        initMap();

        // Event Listeners
        document.getElementById('getLocation').addEventListener('click', () => {
            if (!navigator.geolocation) {
                updateStatus('Geolocation is not supported by your browser', true);
                return;
            }

            navigator.geolocation.getCurrentPosition(handleLocation, handleError);
        });

        document.getElementById('followMe').addEventListener('click', () => {
            if (!navigator.geolocation) {
                updateStatus('Geolocation is not supported by your browser', true);
                return;
            }

            // Clear previous tracking
            locations = [];
            timestamps = [];
            if (polyline) {
                polyline.setLatLngs([]);
            }
            document.getElementById('downloadSection').style.display = 'none';

            // Start tracking
            watchId = navigator.geolocation.watchPosition(handleLocation, handleError);
            document.getElementById('followMe').disabled = true;
            document.getElementById('stopTracking').disabled = false;
            updateStatus('Tracking started');
        });

        document.getElementById('stopTracking').addEventListener('click', () => {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                document.getElementById('followMe').disabled = false;
                document.getElementById('stopTracking').disabled = true;
                document.getElementById('downloadSection').style.display = 'block';
                updateStatus('Tracking stopped - Ready to download');
            }
        });

        document.getElementById('downloadGeoJSON').addEventListener('click', () => {
            if (locations.length > 0) {
                const geoJSON = createGeoJSON();
                downloadFile(
                    JSON.stringify(geoJSON, null, 2),
                    'tracked-route.geojson',
                    'application/geo+json'
                );
            }
        });

        document.getElementById('downloadGPX').addEventListener('click', () => {
            if (locations.length > 0) {
                const gpx = createGPX();
                downloadFile(
                    gpx,
                    'tracked-route.gpx',
                    'application/gpx+xml'
                );
            }
        });
    </script>
</body>
</html>
