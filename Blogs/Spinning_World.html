<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Earth</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden;
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <!-- Load Three.js first -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Load OrbitControls from a reliable source -->
    <script>
        class OrbitControls extends THREE.EventDispatcher {
            constructor(object, domElement) {
                super();
                
                this.object = object;
                this.domElement = domElement;
                
                // Set to false to disable this control
                this.enabled = true;

                this.minDistance = 0;
                this.maxDistance = Infinity;
                this.enableDamping = false;
                this.dampingFactor = 0.05;

                let scope = this;
                let STATE = { NONE: -1, ROTATE: 0, DOLLY: 1, PAN: 2 };
                let state = STATE.NONE;
                
                // Mouse position tracking
                let mouseX = 0, mouseY = 0;
                let lastMouseX = 0, lastMouseY = 0;
                
                // Add event listeners
                this.domElement.addEventListener('mousedown', onMouseDown);
                this.domElement.addEventListener('mousemove', onMouseMove);
                this.domElement.addEventListener('mouseup', onMouseUp);
                this.domElement.addEventListener('wheel', onMouseWheel);
                
                function onMouseDown(event) {
                    if (!scope.enabled) return;
                    
                    event.preventDefault();
                    
                    lastMouseX = event.clientX;
                    lastMouseY = event.clientY;
                    
                    switch (event.button) {
                        case 0: // left mouse
                            state = STATE.ROTATE;
                            break;
                        case 2: // right mouse
                            state = STATE.PAN;
                            break;
                    }
                }
                
                function onMouseMove(event) {
                    if (!scope.enabled || state === STATE.NONE) return;
                    
                    event.preventDefault();
                    
                    mouseX = event.clientX - lastMouseX;
                    mouseY = event.clientY - lastMouseY;
                    
                    if (state === STATE.ROTATE) {
                        scope.object.rotation.y += mouseX * 0.01;
                        scope.object.rotation.x += mouseY * 0.01;
                    }
                    
                    lastMouseX = event.clientX;
                    lastMouseY = event.clientY;
                }
                
                function onMouseUp() {
                    state = STATE.NONE;
                }
                
                function onMouseWheel(event) {
                    if (!scope.enabled) return;
                    
                    event.preventDefault();
                    
                    // Zoom in/out
                    let delta = event.deltaY;
                    scope.object.position.z += delta * 0.01;
                    
                    // Clamp to min/max distance
                    scope.object.position.z = Math.max(
                        scope.minDistance,
                        Math.min(scope.maxDistance, scope.object.position.z)
                    );
                }
            }

            update() {
                // Required for damping
                if (this.enableDamping) {
                    // Add damping logic here if needed
                }
            }
        }
    </script>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Earth geometry and material
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('/images/earth_texture.png')
        });

        // Earth mesh
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        camera.position.z = 3;

        // Add our custom OrbitControls
        const controls = new OrbitControls(earth, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // Animation loop
        const animate = function () {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        };

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Prevent right-click menu
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
