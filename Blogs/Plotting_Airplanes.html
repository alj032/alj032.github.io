<!DOCTYPE html>
<html>
  <head>
    <title>Plane Tracking Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
      integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
      integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM="
      crossorigin=""
    ></script>
    <script src="script.js"></script>
    <style>
      #map {
        height: 500px;
        width: 100%;
      }
    </style>
  </head>
  <body onload="initMap()">
    <div id="map"></div>
  </body>
  
  <script>
  let map;
let planeMarkers = [];

function initMap() {
  map = L.map('map').setView([0, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  }).addTo(map);

  fetchPlaneData();
}

async function fetchPlaneData() {
  try {
    const response = await fetch('https://opensky-network.org/api/states/all');
    const data = await response.json();

    if (data.states) {
      const planeData = data.states.map((state) => ({
        lat: state[6],
        lng: state[5],
        callsign: state[1],
      }));

      updatePlaneMarkers(planeData);
    } else {
      console.error('Error: No plane data received');
    }
  } catch (error) {
    console.error('Error fetching plane data:', error);
  }
}

function updatePlaneMarkers(planeData) {
  // Clear existing markers
  planeMarkers.forEach((marker) => map.removeLayer(marker));
  planeMarkers = [];

  // Add new markers for each plane
  planeData.forEach((plane) => {
    const marker = L.marker([plane.lat, plane.lng]).addTo(map);
    marker.bindPopup(`Callsign: ${plane.callsign}`);
    planeMarkers.push(marker);
  });
}
  </script>
</html>
