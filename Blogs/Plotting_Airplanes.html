<!DOCTYPE html>
<html>
<head>
    <title>Website with Menu Bar</title>
    <style>
        .menu {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
        }

        .menu li {
            float: left;
        }

        .menu li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .menu li a:hover:not(.active) {
            background-color: #ddd;
            color: black;
        }

        .active {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <ul class="menu">
        <li><a class="active" href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="https://www.google.com/maps" target="_blank">Map</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>

    <h1>Welcome to our website</h1>
    <p>Here, you can find information about our company and services.</p>

    <script>
        // Get all menu links
        var menuLinks = document.querySelectorAll(".menu li a");

        // Add click event listener to each menu link
        menuLinks.forEach(function(link) {
            link.addEventListener("click", function() {
                // Remove the "active" class from all menu links
                menuLinks.forEach(function(link) {
                    link.classList.remove("active");
                });

                // Add the "active" class to the clicked menu link
                this.classList.add("active");
            });
        });
    </script>
</body>
</html>
