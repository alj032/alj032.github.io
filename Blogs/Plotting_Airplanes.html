<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile-Friendly Map with Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
        }

		#addLayerButton {
			position: fixed;
			bottom: 20px;
			right: 20px;
			width: 50px;
			height: 50px;
			border-radius: 50%;
			background-color: #333;
			color: white;
			font-size: 24px;
			border: none;
			cursor: pointer;
			z-index: 1000;
		}
    </style>
</head>
<body>
    <div id="map"></div>
	<button id="addLayerButton">+</button>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0, 0], 2); 

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

// Check if geolocation is supported by the browser
if ("geolocation" in navigator) {
    navigator.geolocation.getCurrentPosition(
        function(position) {
            var latitude = position.coords.latitude;
            var longitude = position.coords.longitude;
            
            // Set the map view to the user's location
            map.setView([latitude, longitude], 13);
            
            // Add a marker at the user's location
            L.marker([latitude, longitude]).addTo(map)
                .bindPopup('You are here.')
                .openPopup();
        },
        function(error) {
            console.log('Error getting location:', error);
        }
    );
} else {
    console.log('Geolocation is not supported by this browser.');
}
			

// ... (Existing Leaflet map initialization code)

var layerCount = 0;

document.getElementById('addLayerButton').addEventListener('click', function() {
    layerCount++;
    
    // Prompt the user to choose the input type
    var inputType = prompt('Enter the input type (raw or url):');
    
    if (inputType === 'raw') {
        // Prompt the user to enter the raw GeoJSON data
        var rawGeoJson = prompt('Enter the raw GeoJSON data:');
        
        try {
            // Parse the raw GeoJSON data
            var data = JSON.parse(rawGeoJson);
            addGeoJsonLayer(data);
        } catch (error) {
            console.log('Error parsing raw GeoJSON data:', error);
        }
    } else if (inputType === 'url') {
        // Prompt the user to enter the URL or path to the GeoJSON file
        var geoJsonUrl = prompt('Enter the URL or path to the GeoJSON file:');
        
        // Load and parse the GeoJSON data from the URL
        fetch(geoJsonUrl)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                addGeoJsonLayer(data);
            })
            .catch(function(error) {
                console.log('Error loading GeoJSON data from URL:', error);
            });
    } else {
        console.log('Invalid input type. Please enter either "raw" or "url".');
    }
});

function addGeoJsonLayer(data) {
    // Create a new GeoJSON layer with the parsed data
    var geoJsonLayer = L.geoJSON(data, {
        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 8,
                fillColor: 'blue',
                color: 'white',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            });
        },
        onEachFeature: function(feature, layer) {
            // Create a popup with the feature properties
            var popupContent = '<div>';
            for (var prop in feature.properties) {
                popupContent += '<b>' + prop + ':</b> ' + feature.properties[prop] + '<br>';
            }
            popupContent += '</div>';
            
            // Bind the popup to the layer
            layer.bindPopup(popupContent);
        }
    }).addTo(map);
    
    // Add a unique identifier to the layer
    geoJsonLayer.id = 'layer' + layerCount;
    
    // Create a remove button for the layer
    var removeButton = L.control({position: 'topright'});
    removeButton.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'remove-button');
        div.innerHTML = 'Remove Layer ' + layerCount;
        div.onclick = function() {
            map.removeLayer(geoJsonLayer);
            map.removeControl(removeButton);
        };
        return div;
    };
    removeButton.addTo(map);
}
    </script>
</body>
</html>
