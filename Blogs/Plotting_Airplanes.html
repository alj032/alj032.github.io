<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile-Friendly Map with Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: calc(100vh - 50px);
        }
        .menu {
            background-color: #333;
            overflow: hidden;
        }
        .menu a {
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }
        .menu a:hover {
            background-color: #ddd;
            color: black;
        }
		#addLayerButton {
			position: fixed;
			bottom: 20px;
			right: 20px;
			width: 50px;
			height: 50px;
			border-radius: 50%;
			background-color: #333;
			color: white;
			font-size: 24px;
			border: none;
			cursor: pointer;
			z-index: 1000;
		}
    </style>
</head>
<body>
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
    <div id="map"></div>
	<button id="addLayerButton">+</button>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([51.505, -0.09], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        L.marker([51.5, -0.09]).addTo(map)
            .bindPopup('A sample popup.<br> Easily customizable.')
            .openPopup();
			

// ... (Existing Leaflet map initialization code)

var layerCount = 0;

document.getElementById('addLayerButton').addEventListener('click', function() {
    layerCount++;
    
    // Prompt the user to enter the URL or path to the GeoJSON file
    var geoJsonUrl = prompt('Enter the URL or path to the GeoJSON file:');
    
    // Load and parse the GeoJSON data
    fetch(geoJsonUrl)
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            // Create a new GeoJSON layer with the parsed data
            var geoJsonLayer = L.geoJSON(data, {
                style: function(feature) {
                    return {
                        color: 'blue',
                        weight: 2,
                        fillColor: 'lightblue',
                        fillOpacity: 0.7
                    };
                }
            }).addTo(map);
            
            // Add a unique identifier to the layer
            geoJsonLayer.id = 'layer' + layerCount;
            
            // Create a remove button for the layer
            var removeButton = L.control({position: 'topright'});
            removeButton.onAdd = function (map) {
                var div = L.DomUtil.create('div', 'remove-button');
                div.innerHTML = 'Remove Layer ' + layerCount;
                div.onclick = function() {
                    map.removeLayer(geoJsonLayer);
                    map.removeControl(removeButton);
                };
                return div;
            };
            removeButton.addTo(map);
        })
        .catch(function(error) {
            console.log('Error loading GeoJSON data:', error);
        });
});
    </script>
</body>
</html>
