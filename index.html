<div id="header"></div>
<div id="main"></div>
<div id="footer"></div>

<script>

	fetch('partials/header.html')
		.then(response => response.text())
		.then(data => {
		  document.getElementById('header').innerHTML = data;
		});
	
	fetch('partials/main.html')
		.then(response => response.text())
		.then(data => {
		  document.getElementById('header').innerHTML = data;
		});
	
	fetch('partials/footer.html')
		.then(response => response.text())
		.then(data => {
		  document.getElementById('header').innerHTML = data;
		});
</script>
