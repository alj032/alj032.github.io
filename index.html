<!DOCTYPE html>
<html lang="en">
<head>
<title>CSS Template</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* Style the header */
.header {
  background-color: #f1f1f1;
  padding: 30px;
  text-align: center;
  font-size: 35px;
  border-radius: 25px; /* Rounded corners */
}

/* Container for flexboxes */
.row {
  display: -webkit-flex;
  display: flex;
}

/* Create three equal columns that sits next to each other */
.column {
  -webkit-flex: 1;
  -ms-flex: 1;
  flex: 1;
  padding: 30px;
  text: center;
  margin: 10px;
  height: auto; /* Should be removed. Only for demonstration */
  width: auto;
  border-radius: 25px; /* Rounded corners */
  text-align: center;
}

/* Style the footer */
.footer {
  border-radius: 25px; /* Rounded corners */
  background-color: #f1f1f1;
  padding: 10px;
  text-align: center;
}

/* Responsive layout - makes the three columns stack on top of each other instead of next to each other */
@media (max-width: 600px) {
  .row {
    -webkit-flex-direction: column;
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div>
  <div class="row">
      <div class="column" style="background-color:#aaa;">

      </div>

      <div class="column" style="background-color:#bbb;">

      </div>

      <div class="column" style="background-color:#ccc;">

      </div>
</div>
</div>

<div class="row">

    <div id="main-panel" class="column" style="height: 500px; background-color:#aaa;">
    


    </div>
   
    <div>
    <div class="row">
    <div class="column" style="background-color:#aaa;">
        <video src="https://layers.idrivearkansas.com/cameras/320.jpg" controls>
            Your browser does not support the video tag.
          </video>
    </div>
  <div class="column" style="background-color:#bbb;">Column</div>
  </div>
        <div class="row">
    <div class="column" style="background-color:#aaa;">Column</div>
  <div class="column" style="background-color:#bbb;">Column</div>
  </div>
    </div>

</div>


<div class="footer">
  <p>Footer</p>
</div>

</body>

<script>

document.addEventListener("DOMContentLoaded", function(event) {
  //do work
  var mainPanel = document.getElementById("main-panel");
  var request = fetchAsync("https://picsum.photos/200/300").then(
function(value) { 
    /* code if successful */
    
    document.getElementById('main-panel').style.backgroundImage="url(images/img.jpg)";

    var url = value.url;
    mainPanel.style.backgroundImage = `url(${url})`;
},
function(error) { 
    /* code if some error */
    console.log('error' + error.toString())
}
);;





 
 
});

async function fetchAsync (url) {
  let response = await fetch(url);
  let data = await response
  return data;
}
</script>

</html>
