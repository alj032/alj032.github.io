<style>

/* Style the header */
.header {
  background-color: #f1f1f1;
  padding: 30px;

  font-size: 35px;
  border-radius: 25px; /* Rounded corners */
}

/* Container for flexboxes */
.row {
  display: -webkit-flex;
  display: flex;
}

/* Create three equal columns that sits next to each other */
.column {
  -webkit-flex: 1;
  -ms-flex: 1;
  flex: 1;
  padding: 30px;
  text: center;
  margin: 10px;
  height: auto; /* Should be removed. Only for demonstration */
  width: auto;
  border-radius: 25px; /* Rounded corners */
  text-align: center;
}

/* Style the footer */

}

<script>

window.onload = function() {
  
  var file = document.getElementById("thefile");
  var audio = document.getElementById("audio");
  
  file.onchange = function() {
    var files = this.files;
    audio.src = URL.createObjectURL(files[0]);
    audio.load();
    audio.play();
    var context = new AudioContext();
    var src = context.createMediaElementSource(audio);
    var analyser = context.createAnalyser();

    var mainPanel = document.getElementById("main-panel");

    var canvas = document.getElementById("canvas");
    canvas.width = mainPanel.offsetWidth;
    canvas.height = mainPanel.offsetHeight;
    var ctx = canvas.getContext("2d");

    src.connect(analyser);
    analyser.connect(context.destination);

    analyser.fftSize = 256;

    var bufferLength = analyser.frequencyBinCount;
    console.log(bufferLength);
    console.log(canvas.width);
    console.log(canvas.height);

    var dataArray = new Uint8Array(bufferLength);

    var WIDTH = mainPanel.offsetWidth;;
    var HEIGHT = mainPanel.offsetHeight;

    var barWidth = (WIDTH / bufferLength) * 2.5;
    var barHeight;
    var x = 0;

    function randomIntFromInterval(min, max) { // min and max included 
      return Math.floor(Math.random() * (max - min + 1) + min)
    }

    function renderFrame() {
      requestAnimationFrame(renderFrame);

      x = 0;

      analyser.getByteFrequencyData(dataArray);

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      for (var i = 0; i < bufferLength; i++) {
        barHeight = dataArray[i];
        
        var r = randomIntFromInterval(0,120);
        var g = randomIntFromInterval(120,200);
        var b = randomIntFromInterval(200,255);

        ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
        ctx.fillRect(x, HEIGHT - barHeight, barWidth, barHeight);

        x += barWidth + 1;
      }
    }

    audio.play();
    renderFrame();
  };
};
