<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .timer-container {
      text-align: center;
      margin: 20px auto;
      max-width: 300px;
    }

    .timer-select {
      background: #2d2d2d;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      width: 100%;
      margin-top: 10px;
    }

    .sound-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .sound-card {
      background: #2d2d2d;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .sound-card:hover {
      transform: translateY(-5px);
      background: #3d3d3d;
    }

    .sound-icon {
      font-size: 2em;
      margin-bottom: 10px;
    }

    .volume-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45, 45, 45, 0.9);
      padding: 15px 25px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .sound-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Sleep Sounds</h1>
  </div>

  <div class="timer-container">
    <select id="timer" class="timer-select">
      <option value="0">Continuous</option>
      <option value="900">15 Minutes</option>
      <option value="1800">30 Minutes</option>
      <option value="3600">1 Hour</option>
      <option value="7200">2 Hours</option>
    </select>
  </div>

  <div class="sound-grid">
    <div class="sound-card">
      <div class="sound-icon">🌊</div>
      <div>White Noise</div>
    </div>
    <div class="sound-card">
      <div class="sound-icon">🌧</div>
      <div>Rain</div>
    </div>
    <div class="sound-card">
      <div class="sound-icon">🌊</div>
      <div>Ocean</div>
    </div>
    <div class="sound-card">
      <div class="sound-icon">💨</div>
      <div>Fan</div>
    </div>
    <div class="sound-card">
      <div class="sound-icon">🌳</div>
      <div>Forest</div>
    </div>
    <div class="sound-card">
      <div class="sound-icon">💧</div>
      <div>Stream</div>
    </div>
  </div>

  <div class="volume-container">
    <span>🔊</span>
    <input type="range" class="volume-slider" id="masterVolume" min="0" max="1" step="0.01" value="0.5">
  </div>
</body>
</html>
