<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Sounds</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
        }

        .volume-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(45, 45, 45, 0.9);
            padding: 15px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .volume-slider {
            width: 200px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #666;
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .wheel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            margin-top: 30px;
        }

        .sound-wheel {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sound-card {
            position: absolute;
            width: 120px;
            height: 120px;
            background: #2d2d2d;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            backface-visibility: hidden;
            transform-origin: center;
        }

        .sound-card.playing {
            background: #4a4a4a;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .sound-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .timer-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .timer-select {
            background: #2d2d2d;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sleep Sounds</h1>
    </div>

    <div class="wheel-container">
        <div class="sound-wheel" id="soundWheel"></div>
    </div>

    <div class="timer-container">
        <select id="timer" class="timer-select">
            <option value="0">Continuous</option>
            <option value="900">15 Minutes</option>
            <option value="1800">30 Minutes</option>
            <option value="3600">1 Hour</option>
            <option value="7200">2 Hours</option>
        </select>
    </div>

    <div class="volume-container">
        <span>🔊</span>
        <input type="range" class="volume-slider" id="masterVolume" min="0" max="1" step="0.01" value="0.5">
    </div>

    <script>
        const sounds = [
            { name: 'White Noise', icon: '🌊', file: 'white-noise.mp3' },
            { name: 'Rain', icon: '🌧', file: 'rain.mp3' },
            { name: 'Ocean', icon: '🌊', file: 'ocean.mp3' },
            { name: 'Fan', icon: '💨', file: 'fan.mp3' },
            { name: 'Forest', icon: '🌳', file: 'forest.mp3' },
            { name: 'Stream', icon: '💧', file: 'stream.mp3' }
        ];

        let activeAudio = null;
        let timerTimeout = null;
        let wheelRotation = 0;
        let lastScrollPosition = 0;

        function createSoundCard(sound, index) {
            const card = document.createElement('div');
            card.className = 'sound-card';
            card.innerHTML = `
                <div class="sound-icon">${sound.icon}</div>
                <div>${sound.name}</div>
            `;

            const angle = (360 / sounds.length) * index;
            const radius = 130; // Distance from center
            const radian = (angle * Math.PI) / 180;
            const x = Math.sin(radian) * radius;
            const y = Math.cos(radian) * radius;

            card.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;

            const audio = new Audio(`sounds/${sound.file}`);
            audio.loop = true;

            card.addEventListener('click', () => {
                if (activeAudio === audio && !audio.paused) {
                    audio.pause();
                    card.classList.remove('playing');
                    activeAudio = null;
                    clearTimeout(timerTimeout);
                } else {
                    if (activeAudio) {
                        activeAudio.pause();
                        document.querySelector('.playing')?.classList.remove('playing');
                    }
                    audio.volume = masterVolume.value;
                    audio.play();
                    card.classList.add('playing');
                    activeAudio = audio;
                    startTimer();
                }
            });

            return card;
        }

        function rotateWheel(delta) {
            wheelRotation += delta * 0.5;
            document.getElementById('soundWheel').style.transform = `rotate(${wheelRotation}deg)`;
        }

        // Handle volume changes
        const masterVolume = document.getElementById('masterVolume');
        masterVolume.addEventListener('input', (e) => {
            const volume = e.target.value;
            if (activeAudio) {
                activeAudio.volume = volume;
            }
            
            // Try to update system volume if supported
            if ('mediaSession' in navigator) {
                try {
                    navigator.mediaSession.setVolume(volume);
                } catch (error) {
                    console.log('System volume control not supported');
                }
            }
        });

        function startTimer() {
            clearTimeout(timerTimeout);
            const duration = parseInt(document.getElementById('timer').value);
            if (duration > 0) {
                timerTimeout = setTimeout(() => {
                    if (activeAudio) {
                        activeAudio.pause();
                        document.querySelector('.playing')?.classList.remove('playing');
                        activeAudio = null;
                    }
                }, duration * 1000);
            }
        }

        // Initialize the wheel
        const soundWheel = document.getElementById('soundWheel');
        sounds.forEach((sound, index) => {
            soundWheel.appendChild(createSoundCard(sound, index));
        });

        // Handle scroll for wheel rotation
        window.addEventListener('wheel', (e) => {
            rotateWheel(e.deltaY);
        });

        // Handle touch events for mobile
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const delta = touchStartY - touchY;
            rotateWheel(delta);
            touchStartY = touchY;
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
