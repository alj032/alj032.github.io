<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Level Game</title>
    <style>
        canvas {
            border: 1px solid black;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const tileSize = 40;
const numRows = canvas.height / tileSize;
const numCols = canvas.width / tileSize;

let player = {
    x: 0,
    y: 0,
    color: 'blue'
};

let finish = {
    x: numCols - 1,
    y: numRows - 1,
    color: 'green'
};

let lasers = [];
let level = [];

function generateRandomLevel() {
    level = [];
    for (let row = 0; row < numRows; row++) {
        let newRow = [];
        for (let col = 0; col < numCols; col++) {
            newRow.push(Math.random() > 0.8 ? 1 : 0); // 20% chance to place an obstacle
        }
        level.push(newRow);
    }
    // Ensure the player start position and finish line are free of obstacles
    level[player.y][player.x] = 0;
    level[finish.y][finish.x] = 0;
    generateLasers();
}

function generateLasers() {
    lasers = [];
    for (let i = 0; i < 5; i++) { // Create 5 lasers for the level
        let laser = {
            x: Math.floor(Math.random() * numCols),
            y: Math.floor(Math.random() * numRows),
            direction: Math.random() > 0.5 ? 'horizontal' : 'vertical',
            active: true
        };
        if (level[laser.y][laser.x] === 0 && !(laser.x === player.x && laser.y === player.y) && !(laser.x === finish.x && laser.y === finish.y)) {
            lasers.push(laser);
        } else {
            i--; // Regenerate the laser if it overlaps with player or finish
        }
    }
}

function drawLevel() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let row = 0; row < numRows; row++) {
        for (let col = 0; col < numCols; col++) {
            if (level[row][col] === 1) {
                ctx.fillStyle = 'black';
                ctx.fillRect(col * tileSize, row * tileSize, tileSize, tileSize);
            }
        }
    }
}

function drawPlayer() {
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x * tileSize, player.y * tileSize, tileSize, tileSize);
}

function drawFinish() {
    ctx.fillStyle = finish.color;
    ctx.fillRect(finish.x * tileSize, finish.y * tileSize, tileSize, tileSize);
}

function drawLasers() {
    ctx.fillStyle = 'red';
    lasers.forEach(laser => {
        if (laser.active) {
            ctx.fillRect(laser.x * tileSize, laser.y * tileSize, tileSize, tileSize);
        }
    });
}

function movePlayer(dx, dy) {
    let newX = player.x + dx;
    let newY = player.y + dy;
    if (newX >= 0 && newX < numCols && newY >= 0 && newY < numRows && level[newY][newX] === 0) {
        player.x = newX;
        player.y = newY;
        checkWin();
        checkLaserHit();
    }
}

function checkWin() {
    if (player.x === finish.x && player.y === finish.y) {
        alert("Congratulations! You've reached the finish line!");
        resetGame();
    }
}

function checkLaserHit() {
    lasers.forEach(laser => {
        if (laser.active && laser.x === player.x && laser.y === player.y) {
            alert("You were hit by a laser! Game over.");
            resetGame();
        }
    });
}

function moveLasers() {
    lasers.forEach(laser => {
        if (laser.direction === 'horizontal') {
            laser.x += 1;
            if (laser.x >= numCols) laser.x = 0;
        } else {
            laser.y += 1;
            if (laser.y >= numRows) laser.y = 0;
        }
        checkLaserHit();
    });
}

function resetGame() {
    generateRandomLevel();
    player.x = 0;
    player.y = 0;
    drawGame();
}

function handleKeydown(event) {
    switch (event.key) {
        case 'w':
            movePlayer(0, -1);
            break;
        case 'a':
            movePlayer(-1, 0);
            break;
        case 's':
            movePlayer(0, 1);
            break;
        case 'd':
            movePlayer(1, 0);
            break;
    }
    drawGame();
}

function drawGame() {
    drawLevel();
    drawFinish();
    drawLasers();
    drawPlayer();
}

document.addEventListener('keydown', handleKeydown);

generateRandomLevel();
drawGame();
setInterval(moveLasers, 500); // Move lasers every 500ms


</script>
</body>
</html>
