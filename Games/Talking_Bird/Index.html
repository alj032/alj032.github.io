<!DOCTYPE html>
<html>
<head>
    <title>Platform Game</title>
    <style>
        #gameCanvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Falls: <span id="fallsCount">0</span></p>
    <p>Times Shot: <span id="timesShot">0</span></p>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fallsCountElement = document.getElementById('fallsCount');
        const timesShotElement = document.getElementById('timesShot');
		
		let fallsCount = 0;
    let timesShot = 0;

    const player = {
        x: 50,
        y: 200,
        width: 30,
        height: 50,
        speed: 5,
        velX: 0,
        velY: 0,
        jumping: false
    };

    const enemy = {
        x: 700,
        y: 150,
        width: 30,
        height: 50,
        speed: 2,
        direction: -1
    };

    const laser = {
        x: enemy.x,
        y: enemy.y + enemy.height / 2,
        width: 10,
        height: 5,
        speed: 5,
        active: false
    };

    const platforms = [
        { x: 0, y: 250, width: 200, height: 10 },
        { x: 300, y: 200, width: 200, height: 10 },
        { x: 600, y: 150, width: 200, height: 10 }
    ];

    const keys = {};

    function update() {
        // Move the player horizontally
        player.x += player.velX;

        // Apply gravity
        player.velY += 1;
        player.y += player.velY;

        // Check for collision with platforms
        platforms.forEach(platform => {
            if (
                player.y + player.height > platform.y &&
                player.y < platform.y + platform.height &&
                player.x + player.width > platform.x &&
                player.x < platform.x + platform.width
            ) {
                player.y = platform.y - player.height;
                player.velY = 0;
                player.jumping = false;
            }
        });

        // Keep the player within canvas bounds
        if (player.x < 0) {
            player.x = 0;
        } else if (player.x + player.width > canvas.width) {
            player.x = canvas.width - player.width;
        }

        // Reset player position if falling off the canvas
        if (player.y > canvas.height) {
            player.x = 50;
            player.y = 200;
            player.velY = 0;
            fallsCount++;
            fallsCountElement.textContent = fallsCount;
        }

        // Move the enemy
        enemy.x += enemy.speed * enemy.direction;

        // Reverse enemy direction if it reaches the edges of the platform
        if (enemy.x <= 600 || enemy.x + enemy.width >= 800) {
            enemy.direction *= -1;
        }

        // Shoot laser periodically
        if (!laser.active && Math.random() < 0.01) {
            laser.x = enemy.x;
            laser.y = enemy.y + enemy.height / 2;
            laser.active = true;
        }

        // Move the laser
        if (laser.active) {
            laser.x -= laser.speed;

            // Check for collision with the player
            if (
                laser.x < player.x + player.width &&
                laser.x + laser.width > player.x &&
                laser.y < player.y + player.height &&
                laser.y + laser.height > player.y
            ) {
                player.x = 50;
                player.y = 200;
                player.velY = 0;
                timesShot++;
                timesShotElement.textContent = timesShot;
                laser.active = false;
            }

            // Remove the laser if it goes off-screen
            if (laser.x < 0) {
                laser.active = false;
            }
        }
    }

    function draw() {
        // Clear the canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw the player
        ctx.fillStyle = 'blue';
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Draw the enemy
        ctx.fillStyle = 'red';
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

        // Draw the laser
        if (laser.active) {
            ctx.fillStyle = 'orange';
            ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
        }

        // Draw the platforms
        ctx.fillStyle = 'green';
        platforms.forEach(platform => {
            ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function keyDown(e) {
        keys[e.keyCode] = true;
    }

    function keyUp(e) {
        keys[e.keyCode] = false;
    }

    document.addEventListener('keydown', keyDown);
    document.addEventListener('keyup', keyUp);

    function movePlayer() {
        player.velX = 0;
        if (keys[65] || keys[37]) { // A or Left Arrow
            player.velX = -player.speed;
        }
        if (keys[68] || keys[39]) { // D or Right Arrow
            player.velX = player.speed;
        }
        if ((keys[87] || keys[38] || keys[32]) && !player.jumping) { // W or Up Arrow or Space
            player.velY = -15;
            player.jumping = true;
        }
    }

    function gameLoop() {
        movePlayer();
        requestAnimationFrame(gameLoop);
    }

    loop();
    gameLoop();
</script>
</body>
</html>
